<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🔨 砸蛋有惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1a2c 0%, #4a2b3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 120, 0.15), transparent 50%);
            top: -10%;
            left: -10%;
            pointer-events: none;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(36, 20, 28, 0.7);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border-radius: clamp(32px, 8vw, 72px) clamp(32px, 8vw, 72px) clamp(28px, 6vw, 56px) clamp(28px, 6vw, 56px);
            padding: clamp(16px, 4vw, 40px) clamp(8px, 3vw, 28px) clamp(20px, 4vw, 48px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 200, 100, 0.2) inset, 0 0 30px rgba(255, 180, 40, 0.3);
            border: 1px solid rgba(255, 210, 120, 0.2);
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            font-size: clamp(28px, 7vw, 58px);
            font-weight: 700;
            letter-spacing: 2px;
            color: #FFD93D;
            margin-bottom: 8px;
            text-shadow: 2px 4px 5px #2f1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px 10px;
            flex-wrap: wrap;
        }

        h1 span {
            font-size: 1.3em;
            filter: drop-shadow(2px 4px 2px #8b5a2b);
        }

        .subhead {
            text-align: center;
            color: #fde3b1;
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-shadow: 0 2px 6px #a0522d;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 60px;
            padding: 4px 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            border: 1px solid #ffd78c30;
        }

        .egg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(4px, 1.5vw, 18px);
            padding: 4px 0;
            margin-bottom: 16px;
        }

        .egg {
            aspect-ratio: 0.8 / 1.1;
            background: radial-gradient(circle at 35% 30%, #fff3b0, #e5a129 40%, #b36b1e 80%);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            box-shadow: 
                0 15px 0 #7b460e,
                0 20px 25px rgba(0, 0, 0, 0.6),
                inset 0 -8px 10px rgba(0,0,0,0.4),
                inset 0 10px 20px rgba(255,255,200,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, filter 0.2s;
            position: relative;
            border: 1px solid #ffd58c;
            color: #3d2a12;
            font-weight: 600;
            line-height: 1.2;
            font-size: clamp(11px, 2.5vw, 22px);
            user-select: none;
        }

        .egg::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 20%;
            width: 25%;
            height: 18%;
            background: radial-gradient(circle, #fffad6 10%, transparent 80%);
            border-radius: 50%;
            opacity: 0.9;
            filter: blur(2px);
            z-index: 2;
            pointer-events: none;
        }

        .egg::after {
            content: '';
            position: absolute;
            bottom: 15%;
            right: 15%;
            width: 20%;
            height: 10%;
            background: radial-gradient(circle, rgba(255,255,200,0.3) 0%, transparent 80%);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(3px);
            z-index: 2;
            pointer-events: none;
        }

        .egg span {
            display: block;
            font-size: 2.2em;
            line-height: 1;
            margin-bottom: 4px;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.5));
            z-index: 3;
            position: relative;
        }

        .egg:not(.smashed) span {
            filter: none;
        }

        .egg:not(.smashed):hover {
            transform: scale(1.06) rotate(-1deg);
            box-shadow: 
                0 15px 0 #9b5f1a,
                0 25px 35px black,
                inset 0 -8px 10px rgba(0,0,0,0.4),
                inset 0 12px 25px #fffde7;
            filter: brightness(1.15);
        }

        .egg.smashed {
            background: radial-gradient(circle at 30% 40%, #f9efd8, #edd7b0, #dbba82);
            box-shadow: 
                0 8px 0 #8b5a2e,
                0 15px 25px rgba(0,0,0,0.5),
                inset 0 -4px 6px rgba(0,0,0,0.2),
                inset 0 6px 10px #fff2d0;
            border: 2px dashed #c67c2e;
            color: #3b2817;
            cursor: default;
            transform: scale(0.98);
            filter: saturate(0.95);
        }

        .egg.smashed::after {
            content: '💥';
            position: absolute;
            font-size: 3.5rem;
            opacity: 0.5;
            bottom: 0px;
            right: 0px;
            transform: rotate(-10deg);
            filter: drop-shadow(0 2px 2px #331d0a);
            background: none;
            width: auto;
            height: auto;
            border-radius: 0;
        }

        .egg.smashed::before {
            opacity: 0.2;
        }

        .egg.smashed span {
            filter: drop-shadow(0 2px 2px #7b4a1e);
            font-size: 1.6em;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.3;
            max-width: 100%;
        }

        .egg.shake {
            animation: hammerShake 0.2s cubic-bezier(0.25, 0.1, 0.25, 1) both;
        }

        @keyframes hammerShake {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(6deg); }
            40% { transform: rotate(-5deg); }
            60% { transform: rotate(4deg); }
            80% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        .action-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 3vw, 25px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: clamp(10px, 2.5vw, 16px) clamp(12px, 3vw, 28px);
            margin-top: 8px;
            backdrop-filter: blur(8px);
            border: 1px solid #ffcf8b40;
        }

        .last-prize {
            background: #2d1d15b0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: clamp(1rem, 3.5vw, 1.5rem);
            color: #ffdfb0;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #ffbc6e;
            box-shadow: inset 0 2px 5px #221007;
            min-width: 0;
            flex: 1 1 auto;
            max-width: 100%;
            justify-content: center;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .last-prize span {
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 4px gold);
        }

        .reset-btn {
            background: linear-gradient(145deg, #f5c27b, #d69042);
            border: none;
            border-radius: 60px;
            padding: clamp(6px, 1.8vw, 12px) clamp(16px, 4vw, 40px);
            font-size: clamp(1rem, 3.5vw, 1.7rem);
            font-weight: bold;
            color: #2d170b;
            box-shadow: 0 9px 0 #7b431a, 0 10px 20px black;
            cursor: pointer;
            transition: 0.07s linear;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #ffcd94;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }

        .reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #7b431a, 0 10px 18px black;
        }

        .reset-btn span {
            font-size: 1.6rem;
        }

        .footer-hint {
            text-align: center;
            color: #dbbd91;
            margin-top: 16px;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            opacity: 0.8;
        }

        @media (max-width: 360px) {
            .action-panel {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
            }
            .last-prize, .reset-btn {
                width: 100%;
                justify-content: center;
                box-sizing: border-box;
            }
            .reset-btn {
                white-space: normal;
                padding: 8px 12px;
                font-size: 1.1rem;
            }
            .egg.smashed span {
                font-size: 1.4em;
            }
            .egg.smashed::after {
                font-size: 2.8rem;
                bottom: 5px;
                right: 5px;
            }
        }

        @media (max-width: 280px) {
            .egg.smashed span {
                font-size: 1.2em;
            }
            .egg.smashed::after {
                font-size: 2.2rem;
            }
            .reset-btn {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>🔨</span> 砸蛋有惊喜 <span>✨</span>
        </h1>
        <div class="subhead">✨ 敲开属于你的课堂惊喜 ✨</div>

        <div class="egg-grid" id="eggGrid"></div>

        <div class="action-panel">
            <div class="last-prize" id="lastPrize">
                <span>🔨</span> 砸蛋有喜
            </div>
            <button class="reset-btn" id="resetBtn">
                <span>🔄</span> 新的一局
            </button>
        </div>
        <div class="footer-hint">💥 点击蛋砸开它，每个蛋内藏惊喜 💥</div>
    </div>

    <script>
        (function() {
            const PRIZE_OPTIONS = [
                '小零食*2',
                '饮料*1',
                '法国口音说给我擦皮鞋，我要验牌',
                '帮老师改化学小测',
                '免作业',
                '再来一次',
                '20元红包碎片1/3',
                '饮料*1'
            ];

            const eggGrid = document.getElementById('eggGrid');
            const lastPrizeDiv = document.getElementById('lastPrize');
            const resetBtn = document.getElementById('resetBtn');

            let eggElements = [];
            const EGG_COUNT = 8;

            // ---------- 陶瓷破碎音效 (预生成 + 预激活 + 主增益放大2倍) ----------
            let audioCtx = null;
            let hitBuffer, crackBuffer, shardBuffer;

            // 创建音频上下文并预生成缓冲区
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const sampleRate = audioCtx.sampleRate;

                // 低频冲击
                hitBuffer = audioCtx.createBuffer(1, sampleRate * 0.05, sampleRate);
                const hitData = hitBuffer.getChannelData(0);
                for (let i = 0; i < hitBuffer.length; i++) {
                    hitData[i] = Math.sin(220 * 2 * Math.PI * i / sampleRate) * Math.exp(-i / 500) * 0.3;
                }

                // 主破碎噪声
                crackBuffer = audioCtx.createBuffer(1, sampleRate * 0.2, sampleRate);
                const crackData = crackBuffer.getChannelData(0);
                for (let i = 0; i < crackBuffer.length; i++) {
                    const t = i / sampleRate;
                    const decay = Math.exp(-t * 20);
                    crackData[i] = (Math.random() * 2 - 1) * decay * 0.8;
                }

                // 二次碎片 (高频)
                shardBuffer = audioCtx.createBuffer(1, sampleRate * 0.15, sampleRate);
                const shardData = shardBuffer.getChannelData(0);
                for (let i = 0; i < shardBuffer.length; i++) {
                    const t = i / sampleRate;
                    const decay = Math.exp(-t * 35);
                    shardData[i] = (Math.random() * 2 - 1) * decay * 0.5;
                }
            } catch (e) {
                audioCtx = null;
            }

            // 预激活音频：鼠标进入网格或触摸时立即激活，并播放静音确保就绪
            function preActivateAudio() {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        const silentBuffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
                        const silentSource = audioCtx.createBufferSource();
                        silentSource.buffer = silentBuffer;
                        silentSource.connect(audioCtx.destination);
                        silentSource.start();
                    }).catch(() => {});
                }
                eggGrid.removeEventListener('mouseenter', preActivateAudio);
                eggGrid.removeEventListener('touchstart', preActivateAudio);
            }
            eggGrid.addEventListener('mouseenter', preActivateAudio, { once: true });
            eggGrid.addEventListener('touchstart', preActivateAudio, { once: true });

            function playCeramicBreakSound() {
                try {
                    if (!audioCtx) return;
                    const now = audioCtx.currentTime;
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().catch(() => {});
                    }

                    // 创建主增益节点，将整体音量放大2倍（30人教室清晰可闻）
                    const masterGain = audioCtx.createGain();
                    masterGain.gain.setValueAtTime(2.0, now);
                    masterGain.connect(audioCtx.destination);

                    // 低频冲击
                    const hitSource = audioCtx.createBufferSource();
                    hitSource.buffer = hitBuffer;
                    const lowpass = audioCtx.createBiquadFilter();
                    lowpass.type = 'lowpass';
                    lowpass.frequency.value = 800;
                    const hitGain = audioCtx.createGain();
                    hitGain.gain.setValueAtTime(0.8, now);        // 保持原有包络
                    hitGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    hitSource.connect(lowpass).connect(hitGain).connect(masterGain);

                    // 主破碎
                    const crackSource = audioCtx.createBufferSource();
                    crackSource.buffer = crackBuffer;
                    const bandpass = audioCtx.createBiquadFilter();
                    bandpass.type = 'bandpass';
                    bandpass.frequency.value = 2800;
                    bandpass.Q.value = 10;
                    const crackGain = audioCtx.createGain();
                    crackGain.gain.setValueAtTime(1.0, now);      // 保持原有包络
                    crackGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    crackSource.connect(bandpass).connect(crackGain).connect(masterGain);

                    // 碎片
                    const shardSource = audioCtx.createBufferSource();
                    shardSource.buffer = shardBuffer;
                    const highpass = audioCtx.createBiquadFilter();
                    highpass.type = 'highpass';
                    highpass.frequency.value = 3500;
                    const shardGain = audioCtx.createGain();
                    shardGain.gain.setValueAtTime(0.6, now);      // 保持原有包络
                    shardGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    shardSource.connect(highpass).connect(shardGain).connect(masterGain);

                    // 启动所有音源
                    hitSource.start(now);
                    crackSource.start(now);
                    shardSource.start(now);
                } catch (e) {}
            }

            // ---------- 洗牌 ----------
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function shufflePrizes() {
                const shuffled = shuffleArray(PRIZE_OPTIONS);
                eggElements.forEach((egg, index) => {
                    egg.dataset.prize = shuffled[index];
                });
            }

            function buildEggs() {
                eggGrid.innerHTML = '';
                for (let i = 0; i < EGG_COUNT; i++) {
                    const egg = document.createElement('div');
                    egg.className = 'egg';
                    egg.dataset.index = i;
                    egg.innerHTML = '<span>金</span><span>蛋</span>';
                    eggGrid.appendChild(egg);
                }
                eggElements = document.querySelectorAll('.egg');
                shufflePrizes();
            }

            function resetAllEggs() {
                eggElements.forEach(egg => {
                    egg.classList.remove('smashed', 'shake');
                    egg.innerHTML = '<span>金</span><span>蛋</span>';
                });
                shufflePrizes();
                lastPrizeDiv.innerHTML = `<span>🔨</span> 砸蛋有喜`;
            }

            function handleEggClick(e) {
                const egg = e.target.closest('.egg');
                if (!egg) return;
                if (egg.classList.contains('smashed')) return;

                playCeramicBreakSound();

                egg.classList.add('shake');
                setTimeout(() => {
                    egg.classList.remove('shake');
                }, 200);

                const prize = egg.dataset.prize || '🎁 神秘礼物';
                egg.innerHTML = `<span>${prize}</span>`;
                egg.classList.add('smashed');

                lastPrizeDiv.innerHTML = `<span>🏆</span> ${prize}`;
            }

            resetBtn.addEventListener('click', resetAllEggs);
            eggGrid.addEventListener('click', handleEggClick);

            buildEggs();
        })();
    </script>
</body>
</html>
